<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ADAPT — Print preview</title>
<style>
  body { margin: 0; font-family: system-ui, sans-serif; }
  .toolbar {
    position: sticky;
    top: 0;
    background: #fff;
    border-bottom: 1px solid rgba(0, 0, 0, 0.08);
    padding: 8px 16px;
    display: flex;
    gap: 8px;
    align-items: center;
    z-index: 10;
  }
  .toolbar button {
    padding: 6px 14px;
    font-size: 13px;
    border-radius: 6px;
    border: 1px solid rgba(0, 0, 0, 0.2);
    background: #fff;
    cursor: pointer;
  }
  .toolbar button.primary { background: #1a1a18; color: #fff; border-color: #1a1a18; }
  iframe { width: 100%; height: calc(100vh - 50px); border: 0; }
  @media print {
    .toolbar { display: none; }
    iframe { height: auto; }
  }
</style>
</head>
<body>
<div class="toolbar no-print">
  <button class="primary" onclick="doPrint()">Print or Save PDF</button>
  <button onclick="window.close()">Close</button>
  <span style="font-size:12px;color:#6b6a65;margin-left:8px;" id="meta"></span>
</div>
<iframe id="frame"></iframe>

<script src="api.js"></script>
<script>
function qp(name) { return new URLSearchParams(location.search).get(name); }

async function load() {
  const adaptedId = qp("adapted_id");
  const versionId = qp("version_id");
  if (!adaptedId || !versionId) { document.body.innerHTML = "missing query params"; return; }
  document.getElementById("meta").textContent = `adaptation #${adaptedId}, version ${versionId}`;
  const v = await ADAPT_API.get(`/api/adaptations/${adaptedId}/versions/${versionId}`);
  const frame = document.getElementById("frame");
  frame.srcdoc = v.rendered_html;
  frame.onload = () => {
    if (qp("auto") === "1") setTimeout(() => doPrint(), 250);
  };
}

function doPrint() {
  const frame = document.getElementById("frame");
  frame.contentWindow.focus();
  frame.contentWindow.print();
}

load().catch((e) => { document.body.innerHTML = "<pre>" + e.message + "</pre>"; });
</script>
</body>
</html>
