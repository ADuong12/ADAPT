<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ADAPT — Sign in</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Fraunces:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="login-shell">
  <div class="login-card">
    <div class="logo">ADAPT</div>
    <div class="tag">AI lesson planning for K–12 CS teachers — local development build</div>

    <div class="section-label">Sign in</div>
    <form id="login-form" autocomplete="off">
      <div class="form-row">
        <label>Email</label>
        <input type="email" id="email" placeholder="you@example.com" required>
      </div>
      <div class="form-row">
        <label>Password</label>
        <input type="password" id="password" placeholder="at least 8 characters" required>
      </div>
      <button class="btn-primary" type="submit" style="width:100%;">Sign in</button>
    </form>
    <div style="font-size:11px;color:var(--text3);margin-top:14px;text-align:center;">
      Don't have an account? <a href="#" id="show-register" style="color:var(--accent);">Sign up</a>
    </div>

    <form id="register-form" autocomplete="off" style="display:none;">
      <div class="form-row">
        <label>Full name</label>
        <input type="text" id="reg-name" placeholder="Jane Doe" required>
      </div>
      <div class="form-row">
        <label>Email</label>
        <input type="email" id="reg-email" placeholder="you@example.com" required>
      </div>
      <div class="form-row">
        <label>Password</label>
        <input type="password" id="reg-password" placeholder="at least 8 characters" required>
      </div>
      <button class="btn-primary" type="submit" style="width:100%;">Create account</button>
    </form>
    <div style="font-size:11px;color:var(--text3);margin-top:14px;text-align:center;display:none;" id="back-to-login-wrap">
      Already have an account? <a href="#" id="show-login" style="color:var(--accent);">Sign in</a>
    </div>
  </div>
</div>

<script src="api.js"></script>
<script>
const loginForm = document.getElementById("login-form");
const registerForm = document.getElementById("register-form");
const showRegister = document.getElementById("show-register");
const showLogin = document.getElementById("show-login");
const backToLoginWrap = document.getElementById("back-to-login-wrap");

showRegister.addEventListener("click", (e) => {
  e.preventDefault();
  loginForm.style.display = "none";
  showRegister.parentElement.style.display = "none";
  registerForm.style.display = "block";
  backToLoginWrap.style.display = "block";
});

showLogin.addEventListener("click", (e) => {
  e.preventDefault();
  registerForm.style.display = "none";
  backToLoginWrap.style.display = "none";
  loginForm.style.display = "block";
  showRegister.parentElement.style.display = "block";
});

async function storeAndRedirect(result) {
  localStorage.setItem("authToken", result.accessToken);
  localStorage.setItem("teacherId", String(result.user.teacher_id));
  localStorage.setItem("teacherRole", result.user.role);
  // Fetch full profile for name
  try {
    const profile = await ADAPT_API.get("/api/auth/me");
    localStorage.setItem("teacherName", `${profile.first_name} ${profile.last_name}`);
  } catch {}
  location.href = "dashboard.html";
}

loginForm.addEventListener("submit", async (e) => {
  e.preventDefault();
  try {
    const result = await ADAPT_API.post("/api/auth/login", {
      email: document.getElementById("email").value,
      password: document.getElementById("password").value,
    });
    storeAndRedirect(result);
  } catch (err) {
    alert("Login failed: " + err.message);
  }
});

registerForm.addEventListener("submit", async (e) => {
  e.preventDefault();
  try {
    const result = await ADAPT_API.post("/api/auth/register", {
      name: document.getElementById("reg-name").value,
      email: document.getElementById("reg-email").value,
      password: document.getElementById("reg-password").value,
    });
    storeAndRedirect(result);
  } catch (err) {
    alert("Registration failed: " + err.message);
  }
});
</script>
</body>
</html>
